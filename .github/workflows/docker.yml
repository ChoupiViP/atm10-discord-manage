name: Build and Publish Docker Image

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        id: vars
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/atm10-discord-manager
          tags: |
            # latest sur la branche principale
            type=raw,value=latest,enable={{is_default_branch}}

            # master ou main
            type=ref,event=branch

            # v0.6.0
            type=ref,event=tag

            # sha-xxxxxxxx
            type=sha,prefix=sha-

            # date
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

          labels: |
            org.opencontainers.image.title=ATM10 Discord Manager
            org.opencontainers.image.description=Discord bot for ATM10 server management
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max